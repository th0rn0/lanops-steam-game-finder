kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
    - tag

# ── Lint ──────────────────────────────────────────────────────────────────────

steps:
  - name: discord-lint-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"

  - name: lint
    image: node:lts
    commands:
      - node --check server.js auth.js
      - node --check public/app.js

  - name: discord-lint-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - success

  - name: discord-lint-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - failure

# ── Tests ─────────────────────────────────────────────────────────────────────

  - name: discord-test-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"

  - name: test
    image: node:lts
    commands:
      - npm ci
      - npm test

  - name: discord-test-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - success

  - name: discord-test-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - failure

# ── Docker Build & Push ───────────────────────────────────────────────────────
# Only runs on push to main or v* tags.

  - name: discord-build-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: build-push
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-steam-game-finder
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      auto_tag: true
      auto_tag_aliases:
        - latest
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: discord-build-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - success

  - name: discord-build-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - failure

# ── Smoke Test ────────────────────────────────────────────────────────────────

  - name: discord-smoke-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: smoke-test
    image: docker:27
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker pull th0rn0/lanops-steam-game-finder:latest
      - |
        docker rm -f lanops-smoke 2>/dev/null || true
        docker run -d --name lanops-smoke \
          -e STEAM_API_KEY=smoke-test-key \
          -e SESSION_SECRET=smoke-test-secret \
          th0rn0/lanops-steam-game-finder:latest
        for i in $(seq 1 30); do
          if ! docker inspect lanops-smoke --format='{{.State.Running}}' 2>/dev/null | grep -q true; then
            echo "Container exited unexpectedly:"
            docker logs lanops-smoke
            docker rm lanops-smoke
            exit 1
          fi
          if docker exec lanops-smoke wget -qO- --timeout=3 http://127.0.0.1:3000/api/me > /dev/null 2>&1; then
            echo "Server is up (attempt $i)"
            docker stop lanops-smoke && docker rm lanops-smoke && exit 0
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Server did not respond in time"
        docker logs lanops-smoke
        docker stop lanops-smoke
        docker rm lanops-smoke
        exit 1
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: discord-smoke-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - success

  - name: discord-smoke-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - failure

# ── GitHub Release ────────────────────────────────────────────────────────────
# Only runs on v* tags.

  - name: release
    image: curlimages/curl:8.7.1
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        VERSION=$(cat VERSION | xargs)
        curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/$DRONE_REPO/releases" -d "{\"tag_name\":\"v${VERSION}\",\"name\":\"v${VERSION}\",\"generate_release_notes\":true}"
    when:
      event:
        - tag

  - name: discord-released
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        VERSION=$(cat VERSION | xargs)
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - v${VERSION} Released!\",\"url\":\"https://github.com/$DRONE_REPO/releases/tag/v${VERSION}\"}]}"
    when:
      event:
        - tag
      status:
        - success

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
